<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Signature</title>
</head>
<body style="margin: 0; padding: 24px; background: #fafafa;">

  <!-- Email Signature Card -->
  <table cellpadding="0" cellspacing="0" border="0" style="font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif; color: #1a1a1a; border-collapse: separate; background-color: #ffffff; border-left: 5px solid #ff6b35; border-radius: 4px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.04);">
    <tr>
      <td style="padding: 12px 18px;">
        
        <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse;">
          <tr>
            <!-- Content -->
            <td style="padding: 0; vertical-align: middle;">
              <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse;">
                <tr>
                  <td style="padding: 0 0 2px 0; line-height: 1.1;">
                    <span style="font-size: 16px; font-weight: 700; color: #ff6b35; letter-spacing: -0.3px;">Heshan Wickramaratne</span>
                  </td>
                </tr>
                <tr>
                  <td style="padding: 0 0 8px 0; line-height: 1.2;">
                    <span style="font-size: 11px; font-weight: 500; color: #2a2a2a; letter-spacing: 0.2px; text-transform: uppercase;">Software Engineer</span>
                  </td>
                </tr>
                <tr>
                  <td style="padding: 0; line-height: 1.2;">
                    <span style="font-size: 11px; color: #888888;">Full Stack &nbsp;·&nbsp; Cloud-Native &nbsp;·&nbsp; DevOps</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
        
      </td>
    </tr>
  </table>

</body>
</html>
